<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>miros 💜</title>

    <!-- Sekme Logosu (Yin Yang SVG - Bozulmaz) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 0C22.4 0 0 22.4 0 50s22.4 50 50 50 50-22.4 50-50S77.6 0 50 0zm0 90c-22.1 0-40-17.9-40-40 0-7.3 2-14.2 5.4-20.1C21.2 41.7 34.6 50 50 50s28.8-8.3 34.6-20.1c3.4 5.9 5.4 12.8 5.4 20.1 0 22.1-17.9 40-40 40z' fill='%23fff'/%3E%3Cpath d='M50 50c-15.4 0-28.8-8.3-34.6-20.1C10 35.8 10 42.8 10 50c0 22.1 17.9 40 40 40s40-17.9 40-40c0-7.2 0-14.2-5.4-20.1C78.8 41.7 65.4 50 50 50z'/%3E%3Ccircle cx='50' cy='25' r='7' fill='%23fff'/%3E%3Ccircle cx='50' cy='75' r='7'/%3E%3C/svg%3E">

    <!-- Logolar için FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Ana Tema Ayarları */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Tam Siyah */
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif; /* Düz ve Temiz Font */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Kar Efekti Taşıyıcısı */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            /* Glow efekti verilmiş kar taneleri */
            box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
            pointer-events: none;
        }

        /* İçerik Alanı */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            user-select: none;
        }

        /* Yazı ve Glow */
        h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 20px;
            /* Güçlü Bloom/Glow Efekti */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9),
                         0 0 30px rgba(255, 255, 255, 0.6),
                         0 0 45px rgba(255, 255, 255, 0.4);
        }

        /* Logolar (Void Stil) */
        .social-box {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .social-box a {
            font-size: 2.5rem;
            color: #000000; /* İçi Siyah */
            text-decoration: none;
            -webkit-text-stroke: 1.5px #ffffff; /* Beyaz Çizgiler */
            transition: 0.3s ease;
            display: inline-block;
        }

        .social-box a:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px white);
        }

        /* Kar Düşme Animasyonu */
        @keyframes snowfall {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <!-- Kar Taneleri Buraya Gelecek -->
    <div id="particles"></div>

    <div class="main-container">
        <h1>Yarışamazsın.</h1>
        
        <div class="social-box">
            <!-- Discord -->
            <a href="#" onclick="copyDiscord(event)">
                <i class="fab fa-discord"></i>
            </a>
            <!-- Instagram -->
            <a href="https://www.instagram.com/zafer4kts" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // === Kar Efekti Motoru ===
        const particleContainer = document.getElementById('particles');
        const particleCount = 75; // Kar yoğunluğu

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Rastgele boyut ve hız
            const size = Math.random() * 3 + 2 + 'px';
            const duration = Math.random() * 5 + 5 + 's';
            const delay = Math.random() * 10 + 's';
            
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animation = `snowfall ${duration} linear ${delay} infinite`;
            particle.style.opacity = Math.random();

            particleContainer.appendChild(particle);
        }

        // === Discord Kopyalama ve Mesaj ===
        function copyDiscord(e) {
            e.preventDefault();
            const discordID = "yakandayim";
            navigator.clipboard.writeText(discordID).then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }
    </script>
</body>
</html>
