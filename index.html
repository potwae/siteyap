<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil ve Masaüstü Kusursuz Ölçeklendirme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Başlık ve Mor Kalp -->
    <title>miros 💜</title> 

    <!-- FontAwesome Vector Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === CORE THEME & BACKGROUND === */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden; /* Kar taşmasını engeller */
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* === PARTICLE SYSTEM (SNOW) === */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; /* Etkileşimi engellemez */
        }

        .snowflake {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 
                        0 0 15px rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        /* === MAIN CONTENT WRAPPER === */
        .content-wrapper {
            position: relative;
            z-index: 2; /* Efektlerin önünde durur */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        /* === DYNAMIC GLOW ANIMATION === */
        @keyframes breathingGlow {
            0%   { text-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 0 0 20px rgba(255, 255, 255, 0.2); }
            50%  { text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(255, 255, 255, 0.6), 0 0 60px rgba(255, 255, 255, 0.4); }
            100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.4), 0 0 20px rgba(255, 255, 255, 0.2); }
        }

        /* === TYPOGRAPHY === */
        h1 {
            font-size: clamp(2rem, 8vw, 2.5rem);
            margin-bottom: 40px;
            letter-spacing: 3px;
            font-weight: 800;
            text-align: center;
            user-select: none;
            text-transform: uppercase;
            animation: breathingGlow 4s ease-in-out infinite; /* Nefes alan ritim */
        }

        /* === SOCIAL ICONS NETWORK === */
        .icons {
            display: flex;
            gap: 40px;
        }

        .icons a {
            font-size: 2.8rem;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            
            /* Void stili: İçi tamamen siyah, dış hatlar keskin beyaz */
            color: #000000;
            -webkit-text-stroke: 1.5px #ffffff;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icons a:hover {
            transform: scale(1.15) translateY(-5px); /* Yukarı sıçrama ve büyüme */
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9));
        }

        /* === RESPONSIVE DESIGN (MOBILE) === */
        @media (max-width: 480px) {
            .icons a { font-size: 2.3rem; }
            .icons { gap: 30px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Arka Plan Kar Motoru -->
    <div id="snow-container"></div>

    <!-- Ön Plan İçerik -->
    <div class="content-wrapper">
        <h1>Yarışamazsın.</h1>

        <div class="icons">
            <!-- Discord - Click to Copy -->
            <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
                <i class="fab fa-discord"></i>
            </a>
            <!-- Instagram - Direct Link -->
            <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <!-- === INTERACTIVE SCRIPTS === -->
    <script>
        // --- Clipboard API: Discord ID ---
        function copyDiscord(e) {
            e.preventDefault();
            const nick = "yakandayim";
            navigator.clipboard.writeText(nick).then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }

        // --- Particle Engine (Snow) ---
        function initializeParticles() {
            const container = document.getElementById('snow-container');
            const particleCount = 60; // Yoğunluk

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'snowflake';
                
                // Rastgele boyut ve konumlandırma
                const size = Math.random() * 3 + 1.5 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                particle.style.left = Math.random() * 100 + 'vw';
                
                // Rastgele fizik (hız ve gecikme)
                const duration = Math.random() * 8 + 6 + 's';
                const delay = Math.random() * 5 + 's';
                
                particle.style.animation = `fall ${duration} linear ${delay} infinite`;
                particle.style.opacity = Math.random() * 0.6 + 0.4;

                container.appendChild(particle);
            }
        }

        // --- Dinamik Animasyon Enjeksiyonu ---
        const styleSheet = document.styleSheets[0];
        styleSheet.insertRule(`
            @keyframes fall {
                0%   { transform: translateY(-10vh) translateX(0); }
                50%  { transform: translateY(50vh) translateX(15px); }
                100% { transform: translateY(110vh) translateX(-15px); }
            }
        `, styleSheet.cssRules.length);

        // Sistemi başlat
        window.onload = initializeParticles;
    </script>

</body>
</html>
