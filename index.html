<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>miros 💜</title> 

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯️</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === GENEL TEMA === */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Zifiri Siyah */
            overflow: hidden; 
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif; /* Düz ve fontsuz görünüm */
        }

        /* === KAR YAĞMA EFEKTİ (Guns.lol Tarzı) === */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .snowflake {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            /* Beyaz Glowlu Noktalar */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        /* === İÇERİK === */
        .content-wrapper {
            position: relative;
            z-index: 2;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        /* === YAZI VE GLOW EFEKTİ === */
        h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            margin-bottom: 40px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            /* Yarışamazsın arkasına güçlü glow */
            text-shadow: 0 0 15px rgba(255, 255, 255, 1), 
                         0 0 30px rgba(255, 255, 255, 0.8), 
                         0 0 45px rgba(255, 255, 255, 0.6);
        }

        /* === LOGOLAR === */
        .icons {
            display: flex;
            gap: 35px;
        }

        .icons a {
            font-size: 2.8rem;
            text-decoration: none;
            transition: transform 0.3s ease, filter 0.3s ease;
            color: #000000;
            -webkit-text-stroke: 1.2px #ffffff; /* İçi siyah, dışı beyaz kontür */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icons a:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        /* Mobil Ayar */
        @media (max-width: 480px) {
            .icons a { font-size: 2.2rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="snow-container"></div>

    <div class="content-wrapper">
        <h1>Yarışamazsın.</h1>

        <div class="icons">
            <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // --- Discord Kopyalama ve Mesaj ---
        function copyDiscord(e) {
            e.preventDefault();
            const nick = "yakandayim";
            navigator.clipboard.writeText(nick).then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }

        // --- Kar Yağma Motoru ---
        function initSnow() {
            const container = document.getElementById('snow-container');
            const count = 70; // Nokta yoğunluğu

            for (let i = 0; i < count; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                
                const size = Math.random() * 4 + 2 + 'px';
                flake.style.width = size;
                flake.style.height = size;
                flake.style.left = Math.random() * 100 + 'vw';
                
                const duration = Math.random() * 7 + 4 + 's';
                const delay = Math.random() * 5 + 's';
                
                flake.style.animation = `fall ${duration} linear ${delay} infinite`;
                flake.style.opacity = Math.random() * 0.8 + 0.2;

                container.appendChild(flake);
            }
        }

        // Düşme Animasyonu
        const sheet = document.styleSheets[0];
        sheet.insertRule(`
            @keyframes fall {
                0% { transform: translateY(-10vh); }
                100% { transform: translateY(110vh); }
            }
        `, sheet.cssRules.length);

        window.onload = initSnow;
    </script>

</body>
</html>
