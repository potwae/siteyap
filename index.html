<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarışamazsın.</title>
    <!-- Logolar için FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .icons {
            display: flex;
            gap: 25px;
        }
        .icons a {
            color: white;
            font-size: 2rem;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        .icons a:hover {
            transform: scale(1.1); /* Üstüne gelince hafif büyür */
        }
        /* Fare üstüne gelince logoların kendi rengini alması için */
        .discord:hover { color: #5865F2; }
        .instagram:hover { color: #E1306C; }
    </style>
</head>
<body>

    <h1>Yarışamazsın.</h1>

    <div class="icons">
        <!-- Discord: Tıklayınca nick kopyalar -->
        <a href="#" class="discord" onclick="copyDiscord()" title="Discord: yakandayim">
            <i class="fab fa-discord"></i>
        </a>
        <!-- Instagram: Profile gider -->
        <a href="https://www.instagram.com/zafer4kts" target="_blank" class="instagram" title="Instagram: zafer4kts">
            <i class="fab fa-instagram"></i>
        </a>
    </div>

    <script>
        function copyDiscord() {
            navigator.clipboard.writeText("yakandayim");
            alert("Discord kullanıcı adı 'yakandayim' kopyalandı!");
        }
    </script>

</body>
</html>
