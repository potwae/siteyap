<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miros 🖤</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☯%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif; /* standard sans-serif font */
            overflow: hidden; /* Necessary for the snowfall to not cause scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        /* Snowfall container to hold the particle system */
        #snow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicks to pass through to text/icons */
            z-index: 1; /* Behind main content */
        }

        .snowflake {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            pointer-events: none; /* Must be unclickable */
            /* Added glow to snowfall particles */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.9), 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* Main content: text and icons */
        .main-content {
            position: relative;
            z-index: 2; /* In front of the snowfall */
            text-align: center;
        }

        h1 {
            font-weight: bold;
            font-size: 3rem;
            margin: 0 0 20px 0;
            /* Strong white glow (bloom) effect for centered text */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 255, 255, 0.7), 0 0 45px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 2rem;
            margin-top: 10px;
        }

        .social-icons a {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="snow-container"></div>
    <div class="main-content">
        <h1>Yarışamazsın.</h1>
        <div class="social-icons">
            <a href="https://discordapp.com/users/yakandayim" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://www.instagram.com/zafer4kts" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
    <script>
        // JS Particle Snowfall Generator, recreation of Guns.lol style with white glow
        const snowContainer = document.getElementById('snow-container');
        const numberOfSnowflakes = 80; // Adjust for particle density

        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            // Randomize snowflake properties for natural Guns.lol look
            const size = Math.random() * 5 + 3 + 'px'; // 3px to 8px size
            const speed = Math.random() * 5 + 3 + 's'; // 3s to 8s fall duration
            const delay = Math.random() * 10 + 's'; // Delay for natural look
            
            snowflake.style.width = size;
            snowflake.style.height = size;
            snowflake.style.left = Math.random() * 100 + 'vw'; // Random horizontal start
            snowflake.style.top = -10 + 'vh'; // Start above screen
            snowflake.style.animation = `fall ${speed} linear ${delay} infinite`;

            // JavaScript to handle the fall animation smoothly
            snowflake.animate([
                { top: '-10vh' },
                { top: '110vh' }
            ], {
                duration: Math.random() * 5000 + 3000,
                delay: Math.random() * 10000,
                iterations: Infinity,
                easing: 'linear'
            });

            snowContainer.appendChild(snowflake);
        }

        // Initialize particles
        for (let i = 0; i < numberOfSnowflakes; i++) {
            createSnowflake();
        }
    </script>
</body>
</html>
