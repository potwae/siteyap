<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Sekme Adı: miros 🖤 -->
    <title>miros 🖤</title> 

    <!-- FontAwesome (Logolar için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Tam Siyah Arka Plan */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* Yarışamazsın Yazısı */
        h1 {
            font-size: clamp(1.8rem, 8vw, 2.3rem);
            margin-bottom: 35px;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            /* Beyaz Glow Efekti */
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.6), 
                         0 0 25px rgba(255, 255, 255, 0.3);
        }

        /* Logo Grubu */
        .icons {
            display: flex;
            gap: 35px;
        }

        /* Ortak Logo Stili (Discord & Insta) */
        .icons a {
            font-size: 2.6rem;
            text-decoration: none;
            transition: transform 0.2s ease, filter 0.2s ease;
            
            /* Logo içi siyah, çizgiler beyaz */
            color: #000000;
            -webkit-text-stroke: 1.2px #ffffff;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fare üzerine gelince efektler */
        .icons a:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.7));
        }

        /* Mobilde hafif küçültme (Ekran patlamasın diye) */
        @media (max-width: 480px) {
            .icons a {
                font-size: 2.1rem;
            }
            .icons {
                gap: 25px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

    <h1>Yarışamazsın.</h1>

    <div class="icons">
        <!-- Discord -->
        <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
            <i class="fab fa-discord"></i>
        </a>
        <!-- Instagram -->
        <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts">
            <i class="fab fa-instagram"></i>
        </a>
    </div>

    <script>
        // Discord Kopyalama Fonksiyonu
        function copyDiscord(e) {
            e.preventDefault();
            const nick = "yakandayim";
            navigator.clipboard.writeText(nick).then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }
    </script>

</body>
</html>
