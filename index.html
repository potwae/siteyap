<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>miros 💜</title> 

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯️</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === CORE THEME & BACKGROUND === */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Zifiri Siyah */
            overflow: hidden; /* Kar taşmasını engeller */
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif; /* Düz, Düzlemsel Font */
        }

        /* === PARTICLE SYSTEM (SNOW) === */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Arka planda kalır */
            pointer-events: none; /* Tıklamaları engellemez */
        }

        .snowflake {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            /* Beyaz Glow Efecti */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 
                        0 0 15px rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }

        /* === MAIN CONTENT WRAPPER === */
        .content-wrapper {
            position: relative;
            z-index: 2; /* Karın önünde durur */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        /* === TYPOGRAPHY (Yarışamazsın.) === */
        h1 {
            font-size: clamp(2rem, 8vw, 3rem); /* Responsive yazı boyutu */
            margin-bottom: 40px;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            /* Beyaz Bloom (Glow) Efecti */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 
                         0 0 25px rgba(255, 255, 255, 0.2), 
                         0 0 50px rgba(255, 255, 255, 0.1);
            text-transform: none; /* Büyük/küçük harfe dokunma */
        }

        /* === SOCIAL ICONS NETWORK === */
        .icons {
            display: flex;
            gap: 35px;
        }

        .icons a {
            font-size: 2.8rem;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            
            /* Void stili: İçi siyah, dış hatlar beyaz */
            color: #000000;
            -webkit-text-stroke: 1.2px #ffffff;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icons a:hover {
            transform: scale(1.15); /* Hafif büyüme */
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
        }

        /* === RESPONSIVE DESIGN (MOBILE) === */
        @media (max-width: 480px) {
            .icons a { font-size: 2.3rem; }
            .icons { gap: 25px; }
            h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <div id="snow-container"></div>

    <div class="content-wrapper">
        <h1>Yarışamazsın.</h1>

        <div class="icons">
            <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <script>
        // --- Clipboard API: Discord ID ---
        function copyDiscord(e) {
            e.preventDefault();
            const nick = "yakandayim";
            navigator.clipboard.writeText(nick).then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }

        // --- Particle Engine (Snow) ---
        function initializeParticles() {
            const container = document.getElementById('snow-container');
            const particleCount = 60; // Kar yoğunluğu

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'snowflake';
                
                // Rastgele boyut (2px - 5px)
                const size = Math.random() * 3 + 2 + 'px';
                particle.style.width = size;
                particle.style.height = size;
                
                // Rastgele yatay pozisyon
                particle.style.left = Math.random() * 100 + 'vw';
                
                // Rastgele fizik (hız ve gecikme)
                const duration = Math.random() * 10 + 6 + 's'; // 6s - 16s arası düşüş
                const delay = Math.random() * 5 + 's'; // 0s - 5s arası başlama gecikmesi
                
                // CSS animasyonu ekle
                particle.style.animation = `fall ${duration} linear ${delay} infinite`;
                // Rastgele opaklık
                particle.style.opacity = Math.random() * 0.7 + 0.3;

                container.appendChild(particle);
            }
        }

        // --- Dinamik Animasyon Enjeksiyonu ---
        const styleSheet = document.styleSheets[0];
        styleSheet.insertRule(`
            @keyframes fall {
                0%   { transform: translateY(-10vh) translateX(0); }
                50%  { transform: translateY(50vh) translateX(15px); }
                100% { transform: translateY(110vh) translateX(-15px); }
            }
        `, styleSheet.cssRules.length);

        // Sistemi başlat
        window.onload = initializeParticles;
    </script>

</body>
</html>
