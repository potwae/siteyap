<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>miros ❤︎</title>
    
    <!-- Yin Yang Logosu (Koda Gömülü) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☯️</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 
                         0 0 20px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        .icons {
            display: flex;
            gap: 35px;
        }

        .icons a {
            font-size: 2.8rem;
            text-decoration: none;
            transition: transform 0.2s ease, filter 0.2s ease;
            color: #000000;
            -webkit-text-stroke: 1.2px #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .instagram-icon {
            -webkit-text-stroke: 0.8px rgba(255, 255, 255, 0.6) !important;
            filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.3)) !important;
        }

        .icons a:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        @media (max-width: 480px) {
            .icons a { font-size: 2.2rem; }
            .icons { gap: 25px; }
        }
    </style>
</head>
<body>

    <h1>Yarışamazsın.</h1>

    <div class="icons">
        <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
            <i class="fab fa-discord"></i>
        </a>
        <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts" class="instagram-icon">
            <i class="fab fa-instagram"></i>
        </a>
    </div>

    <script>
        function copyDiscord(e) {
            e.preventDefault();
            navigator.clipboard.writeText("yakandayim");
            alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
        }
    </script>

</body>
</html>
