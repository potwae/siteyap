<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Bu satır sitenin her cihazda (mobil/tablet) düzgün görünmesini sağlar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>miros ❤︎</title> 
    
    <!-- Yin Yang Logosu (GitHub'da favicon.png adında bir resim varsa çalışır) -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- FontAwesome logoları için -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        h1 {
            font-size: clamp(1.5rem, 8vw, 2.2rem); /* Ekrana göre boyutunu otomatik ayarlar */
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            /* Glow efekti */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 
                         0 0 20px rgba(255, 255, 255, 0.4);
            user-select: none;
        }

        .icons {
            display: flex;
            gap: 30px;
        }

        .icons a {
            font-size: 2.5rem;
            text-decoration: none;
            transition: transform 0.2s ease, filter 0.2s ease;
            
            /* Siyah iç, beyaz ince kontür */
            color: #000000;
            -webkit-text-stroke: 1.5px white; /* Çizgileri belirginleştirir */
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icons a:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }

        /* Mobilde logoların çok büyük kalmaması için */
        @media (max-width: 480px) {
            .icons a {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <h1>Yarışamazsın.</h1>

    <div class="icons">
        <a href="#" onclick="copyDiscord(event)" title="Discord: yakandayim">
            <i class="fab fa-discord"></i>
        </a>
        <a href="https://www.instagram.com/zafer4kts" target="_blank" title="Instagram: zafer4kts">
            <i class="fab fa-instagram"></i>
        </a>
    </div>

    <script>
        function copyDiscord(e) {
            e.preventDefault();
            navigator.clipboard.writeText("yakandayim");
            alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
        }
    </script>

</body>
</html>
