<!DOCTYPE html>
<html lang="tr" style="background-color: #000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>miros 💜</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='white'/%3E%3Cpath d='M50,2a48,48 0 0,1 0,96a24,24 0 0,1 0,-48a24,24 0 0,0 0,-48' fill='black'/%3E%3Ccircle cx='50' cy='26' r='22.5' fill='white'/%3E%3Ccircle cx='50' cy='26' r='7' fill='black'/%3E%3Ccircle cx='50' cy='74' r='22.5' fill='black'/%3E%3Ccircle cx='50' cy='74' r='7' fill='white'/%3E%3C/svg%3E">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html, body {
            background-color: #000000 !important;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff;
            top: -50px; 
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: clamp(2.2rem, 10vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 30px;
            animation: hyperGlow 4s infinite ease-in-out;
        }

        @keyframes hyperGlow {
            0% { text-shadow: 0 0 12px rgba(255, 255, 255, 0.4); }
            50% { text-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 0 0 50px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 12px rgba(255, 255, 255, 0.4); }
        }

        .social-box { display: flex; gap: 30px; }
        .social-box a {
            font-size: 2.8rem;
            color: #000;
            -webkit-text-stroke: 1.5px #fff;
            text-decoration: none;
            transition: 0.3s ease;
        }
        .social-box a:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px white); }

        .visitor-counter {
            position: fixed;
            bottom: 25px; left: 25px;
            z-index: 20;
            display: flex; align-items: center; gap: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        @keyframes fall {
            from { transform: translateY(0vh); }
            to { transform: translateY(115vh); }
        }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="main-container">
        <h1>Yarışamazsın.</h1>
        <div class="social-box">
            <a href="#" onclick="copyDiscord(event)"><i class="fab fa-discord"></i></a>
            <a href="https://www.instagram.com/zafer4kts" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="visitor-counter">
        <i class="fas fa-eye"></i>
        <span id="visit-count">Yükleniyor...</span>
    </div>

    <script>
        // Kar Yağışı
        const container = document.getElementById('particles');
        for (let i = 0; i < 70; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 2 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animation = `fall ${Math.random() * 5 + 4}s linear ${Math.random() * 8}s infinite`;
            p.style.opacity = Math.random();
            container.appendChild(p);
        }

        // Discord Kopyala
        function copyDiscord(e) {
            e.preventDefault();
            navigator.clipboard.writeText("yakandayim").then(() => {
                alert("kullanıcı adını kopyaladım normie, koş dmye kampını kur.");
            });
        }

        // GERÇEK GLOBAL SAYAÇ SİSTEMİ
        function updateCounter() {
            const countElement = document.getElementById('visit-count');
            // 'miros_global_final' bu senin sitene özel havuzdur.
            const siteKey = 'miros_global_final_2026'; 

            // API üzerinden global sayıyı çek ve +1 artır
            fetch(`https://api.countapi.xyz/hit/${siteKey}/visits`)
            .then(res => res.json())
            .then(data => {
                countElement.innerText = data.value;
            })
            .catch(() => {
                // Eğer API'de genel bir sorun olursa manuel artış gösterir
                let fallback = localStorage.getItem('backup_val') || 10;
                fallback = parseInt(fallback) + 1;
                localStorage.setItem('backup_val', fallback);
                countElement.innerText = fallback;
            });
        }
        
        updateCounter();
    </script>
</body>
</html>
